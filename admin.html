<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin - Calzados Byga</title>
    <link rel="stylesheet" href="css/styles.css">
    <style>
        body {
            background-color: #f4f4f4;
        }
        .admin-container {
            max-width: 600px;
            margin: 50px auto;
            padding: 2rem;
            background: white;
            border-radius: 8px;
            box-shadow: 0 4px 8px rgba(0,0,0,0.1);
        }
        .admin-container h1 {
            text-align: center;
            margin-bottom: 1.5rem;
        }
        .form-group {
            margin-bottom: 1rem;
        }
        .form-group label {
            display: block;
            margin-bottom: 0.5rem;
        }
        .form-group input, .form-group select {
            width: 100%;
            padding: 0.75rem;
            border: 1px solid #ccc;
            border-radius: 4px;
        }
        .btn-submit {
            width: 100%;
            padding: 0.75rem;
            background-color: #27ae60;
            color: white;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-size: 1rem;
        }
        .btn-submit:hover {
            background-color: #2ecc71;
        }
        #notification {
            position: fixed;
            top: 20px;
            right: 20px;
            padding: 1rem 2rem;
            border-radius: 5px;
            color: white;
            z-index: 2000;
            display: none;
        }
        #notification.success { background: #27ae60; }
        #notification.error { background: #e74c3c; }
    </style>
</head>
<body>
    <div class="admin-container">
        <h1>Agregar Nuevo Producto</h1>
        <form id="addProductForm">
            <div class="form-group"><label for="name">Nombre del Producto</label><input type="text" id="name" required></div>
            <div class="form-group"><label for="price">Precio</label><input type="number" id="price" step="0.01" required></div>
            <div class="form-group"><label for="stock">Stock</label><input type="number" id="stock" required></div>
            <div class="form-group">
                <label for="category">Categoría</label>
                <select id="category" required>
                    <option value="Zapatillas">Zapatillas</option><option value="Botines">Botines</option><option value="Zapatos">Zapatos</option><option value="Sandalias">Sandalias</option><option value="Botas">Botas</option><option value="Ojotas">Ojotas</option><option value="Infantil">Infantil</option>
                </select>
            </div>
            <div class="form-group"><label for="image">Imagen del Producto</label><input type="file" id="image" accept="image/*" required></div>
            <button type="submit" class="btn-submit">Agregar Producto</button>
        </form>
    </div>

    <div id="notification"></div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="js/admin.js"></script>
</body>
</html>
